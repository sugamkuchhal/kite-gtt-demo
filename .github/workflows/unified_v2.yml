name: Unified Script Runner v2

on:
  schedule:
    - cron: "0,30 4-9 * * 1-5"   # 09:30–15:15 IST every 30 mins, Mon–Fri
 #   - cron: "15,45 4-9 * * 1-5"   # 09:30–15:15 IST every 30 mins, Mon–Fri
    - cron: "30 12 * * 1-5"      # 18:00 IST (4:00 PM) Mon–Fri
    - cron: "0,30 3 * * *"         # 08:30,08:45,09:00 IST (all days)
 #   - cron: "15 3 * * *"         # 08:30,08:45,09:00 IST (all days)
  workflow_dispatch:
    inputs:
      script:
        description: "Script mode: script to run (e.g. zerodha_tick_size)."
        required: false
        default: ""
      mode:
        description: "Run mode: eod | midday | refresh"
        required: false
        type: choice
        options:
          - SELECT
          - eod
          - midday
          - refresh

# Overlap safety: queue new runs until the current one finishes
concurrency:
  group: unified-script-runner
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Decide auto action window
        id: plan
        env:
          MODE: ${{ github.event.inputs.mode }}
          SCRIPT: ${{ github.event.inputs.script }}
        run: |
          set -euo pipefail

          MODE_VAL="${MODE:-}"
          CMD_VAL="${SCRIPT:-}"
          CRON_EXPR="${{ github.event.schedule }}"
          EVENT_NAME="${{ github.event_name }}"
          
          TODAY=$(TZ=Asia/Kolkata date +%d-%m-%Y)
          HOLIDAY_FILE="holidays.txt"

          # Skip scheduled runs on holidays
          if [ "$EVENT_NAME" = "schedule" ] && [ -f "$HOLIDAY_FILE" ]; then
            if grep -Fxq "$TODAY" "$HOLIDAY_FILE"; then
              echo "::notice::Holiday ($TODAY) → skipping scheduled run"
              echo "action=none" >> "$GITHUB_OUTPUT"
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "command=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          
          ACTION="none"
          
          # 1. Script override
          if [ -n "$CMD_VAL" ]; then
            ACTION="script"
          
          # 2. Manual mode (explicit)
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$MODE_VAL" != "SELECT" ]; then
            ACTION="$MODE_VAL"
          
          # 3. Scheduled run → map cron → action
          elif [ "$EVENT_NAME" = "schedule" ]; then
            case "$CRON_EXPR" in
              "0,30 4-9 * * 1-5")
                ACTION="midday"
                ;;
              "30 12 * * 1-5")
                ACTION="eod"
                ;;
              "0,30 3 * * *")
                ACTION="refresh"
                ;;
              *)
                ACTION="none"
                ;;
            esac
          fi
          
          SHOULD_RUN=true
          if [ "$ACTION" = "none" ]; then
            SHOULD_RUN=false
            echo "::notice::No action selected (SELECT). Exiting."
          else
            echo "::notice::action=${ACTION} (event=${EVENT_NAME})"
          fi

          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "command=$CMD_VAL" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        if: ${{ steps.plan.outputs.should_run == 'true' }}
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements/full.txt

      - name: Sync requirements/full.txt (auto)
        if: ${{ steps.plan.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          python3 generate_full_requirements.py --render > /tmp/full.new
          if [ ! -f requirements/full.txt ]; then
            mv /tmp/full.new requirements/full.txt
            echo "::notice::requirements/full.txt created."
            exit 0
          fi
          if ! diff -u requirements/full.txt /tmp/full.new; then
            mv /tmp/full.new requirements/full.txt
            echo "::notice::requirements/full.txt updated."
          else
            echo "::notice::requirements/full.txt is up to date."
          fi

      - name: Commit requirements/full.txt if changed
        if: ${{ steps.plan.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          if git diff --quiet -- requirements/full.txt; then
            echo "::notice::No requirements/full.txt changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements/full.txt
          git commit -m "chore: update requirements/full.txt [skip ci]"
          git push

      - name: Write auth files (api_key/access_token)
        if: ${{ steps.plan.outputs.should_run == 'true' }}
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          echo "$API_KEY" > api_key.txt
          echo "$ACCESS_TOKEN" > access_token.txt

      - name: Check token validity (kiteconnect only)
        id: token_check
        if: ${{ steps.plan.outputs.should_run == 'true' }}
        env:
          ACTION: ${{ steps.plan.outputs.action }}
        run: |
          set -euo pipefail
          if [ "$ACTION" = "refresh" ]; then
            echo "token_valid=false" >> "$GITHUB_OUTPUT"
            echo "need_login=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 -m pip install --quiet --target .deps_check kiteconnect
          if PYTHONPATH=".deps_check${PYTHONPATH:+:$PYTHONPATH}" python3 ensure_token.py --check-only; then
            echo "token_valid=true" >> "$GITHUB_OUTPUT"
            echo "need_login=false" >> "$GITHUB_OUTPUT"
          else
            echo "token_valid=false" >> "$GITHUB_OUTPUT"
            echo "need_login=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve dependency groups
        id: deps
        if: ${{ steps.plan.outputs.should_run == 'true' }}
        env:
          ACTION: ${{ steps.plan.outputs.action }}
          COMMAND: ${{ steps.plan.outputs.command }}
          NEED_LOGIN: ${{ steps.token_check.outputs.need_login }}
        run: |
          set -euo pipefail
          python3 resolve_deps.py \
            --action "$ACTION" \
            --command "$COMMAND" \
            --need-login "$NEED_LOGIN" >> "$GITHUB_OUTPUT"

      - name: Install Google Chrome
        if: ${{ steps.plan.outputs.should_run == 'true' && steps.token_check.outputs.need_login == 'true' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get -fy install
          google-chrome --version

      - name: Create virtualenv and install deps
        if: ${{ steps.plan.outputs.should_run == 'true' }}
        run: |
          if [ "${{ steps.deps.outputs.packages_empty }}" = "true" ]; then
            echo "::notice::No external packages required; skipping venv creation."
            exit 0
          fi
          python3 -m venv .venv
          if [ "${{ steps.deps.outputs.use_full }}" = "true" ]; then
            .venv/bin/pip install -r "${{ steps.deps.outputs.req_file }}"
          else
            if [ -n "${{ steps.deps.outputs.packages }}" ]; then
              .venv/bin/pip install ${{ steps.deps.outputs.packages }}
            fi
          fi

      - name: Recreate non-auth secret files (repo root + Mac path mirror)
        if: ${{ steps.plan.outputs.should_run == 'true' && steps.plan.outputs.action != 'refresh' }}
        env:
          CREDS_JSON: ${{ secrets.CREDS_JSON }}
          SMTP_TOKEN_JSON: ${{ secrets.SMTP_TOKEN_JSON }}
        run: |
          set -euo pipefail
          MACDIR="/Users/sugamkuchhal/Documents/kite-gtt-demo"
          sudo mkdir -p "$MACDIR" || true
          [ -n "$CREDS_JSON" ] && printf '%s' "$CREDS_JSON" > creds.json
          [ -n "$SMTP_TOKEN_JSON" ] && printf '%s' "$SMTP_TOKEN_JSON" > smtp_token.json
          [ -n "$CREDS_JSON" ] && printf '%s' "$CREDS_JSON" | sudo tee "$MACDIR/creds.json" >/dev/null || true
          [ -n "$SMTP_TOKEN_JSON" ] && printf '%s' "$SMTP_TOKEN_JSON" | sudo tee "$MACDIR/smtp_token.json" >/dev/null || true
          ls -l creds.json smtp_token.json api_key.txt access_token.txt || true

      - name: Run unified modes (script/refresh/midday/eod/auto)
        if: ${{ steps.plan.outputs.should_run == 'true' }}
        env:
          ACTION: ${{ steps.plan.outputs.action }}
          CMD_VAL: ${{ steps.plan.outputs.command }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          sudo -E bash -lc '
            set -euo pipefail
            if [ -f .venv/bin/activate ]; then
              source .venv/bin/activate
            else
              echo "::notice::No venv present; using system python."
            fi
            export PATH="$PWD/bin:$PATH"

            ensure_token_cmd() {
              ensure_token "$@"
            }

            # Script mode: run a single command (script wrapper)
            if [ "$ACTION" = "script" ]; then
              echo "::notice::mode=script → ensuring token, then running: ${CMD_VAL}"
              ensure_token_cmd
              eval "$CMD_VAL"
              exit 0
            fi

            # Refresh mode: force token refresh and exit
            if [ "$ACTION" = "refresh" ]; then
              echo "::notice::mode=refresh → forcing token refresh"
              ensure_token_cmd --force
              exit 0
            fi

            # Ensure token before running chains
            ensure_token_cmd

            if [ "$ACTION" = "midday" ]; then
              echo "::group::RUN: Mid-day chain"
              python3 zerodha_tick_size.py
              python3 set_field_false.py
              python3 fetch_all_gtts.py
              python3 fetch_all_orders.py
              python3 gtt_processor.py --sheet-id "14G8Yinl28F9ZROedyhiH4p5jCz2bcfA2goVB21PVE1s" --sheet-name "DEL_GTT_INS"
              python3 gtt_processor.py --sheet-id "14G8Yinl28F9ZROedyhiH4p5jCz2bcfA2goVB21PVE1s" --sheet-name "INS_GTT_INS"
              echo "::endgroup::"
            elif [ "$ACTION" = "eod" ]; then
              echo "::group::RUN: EOD chain"
              python3 zerodha_tick_size.py
              python3 nse_combined_fetcher.py --mode stock --ticker-file nse_stock_list.txt --worksheet "NSE_Stock_Data" --max-workers 3 --batch-size 50
              python3 nse_combined_fetcher.py --mode etf --ticker-file nse_etf_list.txt --worksheet "NSE_ETF_Data" --max-workers 3 --batch-size 50
              python3 nse_data_etl.py
              python3 prepare_feed_date_ext.py
              python3 prepare_feed_data_val.py
              python3 prepare_feed_list.py --sheet-name "Algo Master Feed Sheet" --source-sheet "SGST_OPEN_LIST" --dest-sheet "SGST_FILTERED_TICKERS"
              python3 prepare_feed_list.py --sheet-name "Algo Master Feed Sheet" --source-sheet "SUPER_OPEN_LIST" --dest-sheet "SUPER_FILTERED_TICKERS"
              python3 prepare_feed_list.py --sheet-name "Algo Master Feed Sheet" --source-sheet "TURTLE_OPEN_LIST" --dest-sheet "TURTLE_FILTERED_TICKERS"
              python3 set_field_false.py
              python3 fetch_all_gtts.py
              python3 fetch_all_orders.py
              python3 append_new_orders.py
              python3 fifo_portfolio.py
              python3 fetch_holdings.py
              python3 date_ext.py
              python3 data_val.py
              bash combined_run.sh
              python3 ops_sort.py --sheet-name="SARAS Portfolio - Stocks" --green-tab="Mailing_List" --red-tab="Old_Mailing_List" --yellow-tab="Action_Mailing_List" --loose-update
              python3 algo_tickers_mailer.py --emails "sugamkuchhal@gmail.com"
              echo "::endgroup::"
            else
              echo "::notice::action=$ACTION has no chain; exiting."
            fi
          '
