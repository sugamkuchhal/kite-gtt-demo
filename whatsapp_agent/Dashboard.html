<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; background: #f7f7fb; }
    .card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
    .title { font-weight: 700; margin-bottom: 6px; }
    .meta { color: #666; font-size: 13px; margin-bottom: 8px; }
    .msg { background: #f1f3f5; border-radius: 8px; padding: 10px; white-space: pre-wrap; }
    .btn { display:inline-block; margin-top:10px; margin-right:8px; padding:10px 12px; border-radius:8px; text-decoration:none; font-weight:600; }
    .send { background:#25D366; color:white; }
    .skip { background:#ddd; color:#222; border:0; }
  </style>
</head>
<body>
  <h2>📨 Send-Ready WhatsApp Messages</h2>
  <div id="root">Loading...</div>

  <script>
    const emoji = { birthday: '🎂', anniversary: '💍', diwali: '🪔', holi: '🎨', christmas: '🎄', 'new year': '🎉' };

    function render(rows) {
      const root = document.getElementById('root');
      if (!rows.length) {
        root.innerHTML = '<p>No messages for today.</p>';
        return;
      }

      root.innerHTML = rows.map(r => {
        const icon = emoji[String(r.event_type).toLowerCase()] || '✨';
        return `
          <div class="card">
            <div class="title">${icon} ${escapeHtml(r.name)} – ${escapeHtml(r.event_type)}</div>
            <div class="meta">${escapeHtml(r.chat_type)} • media: ${escapeHtml(r.media_mode)}</div>
            <div class="msg">${escapeHtml(r.final_message_text)}${r.media_url ? '\n'+escapeHtml(r.media_url) : ''}</div>
            <a class="btn send" href="${escapeHtml(r.wa_link)}" target="_blank" onclick="mark('${r.id}','sent')">Send on WhatsApp</a>
            <button class="btn skip" onclick="mark('${r.id}','skipped')">Skip</button>
          </div>`;
      }).join('');
    }

    function mark(id, action) {
      google.script.run.markAction(id, action);
    }

    function escapeHtml(v) {
      return String(v || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    google.script.run.withSuccessHandler(render).getTodayQueue();
  </script>
</body>
</html>
